<text y="287" xml:space="preserve">
<tspan x="16.0" textLength="78.0" lengthAdjust="spacing" fill="#c5cdd9">## Summary</tspan>
</text>
<text y="301" xml:space="preserve">
<tspan x="16.0" textLength="709.8" lengthAdjust="spacing" fill="#c5cdd9">Level 1, the forest entrance and tutorial-ish opener: teaches walking, jumping, and dashing</tspan>
</text>
<text y="315" xml:space="preserve">
<tspan x="16.0" textLength="374.4" lengthAdjust="spacing" fill="#c5cdd9">through gentle gating, ending at the cave mouth.</tspan>
</text>
<text y="329" xml:space="preserve">
</text>
<text y="343" xml:space="preserve">
<tspan x="16.0" textLength="171.6" lengthAdjust="spacing" fill="#c5cdd9">## Acceptance criteria</tspan>
</text>
<text y="357" xml:space="preserve">
<tspan x="16.0" textLength="327.6" lengthAdjust="spacing" fill="#c5cdd9">- [ ] Level is completable start to finish</tspan>
</text>
<text y="371" xml:space="preserve">
<tspan x="16.0" textLength="343.2" lengthAdjust="spacing" fill="#c5cdd9">- [ ] Introduces dash via an unavoidable gap</tspan>
</text>
<text y="385" xml:space="preserve">
<tspan x="16.0" textLength="397.8" lengthAdjust="spacing" fill="#c5cdd9">- [ ] Has a clear entrance and an exit into Level 2</tspan>
</text>
<text y="399" xml:space="preserve">
</text>
<text y="413" xml:space="preserve">
<tspan x="16.0" textLength="62.4" lengthAdjust="spacing" fill="#c5cdd9">## Notes</tspan>
</text>
<text y="427" xml:space="preserve">
<tspan x="16.0" textLength="702.0" lengthAdjust="spacing" fill="#c5cdd9">The big fan-in: depends on dash #008, the player sprite #017, and the forest tileset #019.</tspan>
</text>
<text y="441" xml:space="preserve">
<tspan x="16.0" textLength="335.4" lengthAdjust="spacing" fill="#c5cdd9">Blocks Level 2 #022 and the world map #023.</tspan>
</text>
